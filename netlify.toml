# Netlify ビルド設定（昇栄塗装ホームページ）
#
# microCMS で記事を「公開」 → microCMS の Webhook が下記の Build hook を叩く
# → Netlify がこの設定でビルド（記事を取得して静的HTML化）→ 自動公開、という流れです。
#
# 公開ディレクトリについて:
#   このサイトは `npm run minify` で dist/ に本番用ファイルを出力する構成のため、
#   publish = "dist" にしています（dist/ の中に index.html や blog/ が入ります）。
#
#   もし「ルート公開（リポジトリ直下をそのまま公開）」に切り替えたい場合は、
#   下の publish = "dist" を publish = "." に変更し、
#   command を "npm run build-blog" だけにしてください（minify を省略）。

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
